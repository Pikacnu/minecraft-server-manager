steps:
  - name: trivy-scan
    image: woodpeckerci/plugin-trivy
    settings:
      dir: .
      severity: HIGH,CRITICAL
      exit-code: 1
      skip-dirs: vendor,node_modules
    when:
      - event: [push, pull_request]

  - name: set-short-sha
    image: bash
    commands:
      - echo "SHORT_SHA=${CI_COMMIT_SHA:0:8}" >> .env
    when:
      - event: push
        branch: main

  - name: build-and-push
    image: woodpeckerci/plugin-kaniko
    depends_on: [set-short-sha]
    settings:
      registry:
        from_secret: DOCKER_REGISTRY
      repo: minecraft-server-manager
      tags:
        - latest
        - ${CI_COMMIT_TAG:-${SHORT_SHA}}
      dockerfile: Dockerfile
      context: .
      build-args:
        NODE_ENV: production
      docker-config-json:
        from_secret: docker-config-json
    when:
      - event: push
        branch: main

  - name: discord-success
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: DISCORD_WEBHOOK_ID
      webhook_token:
        from_secret: DISCORD_WEBHOOK_TOKEN
      username: minecraft-server-manager CI
      message: |
        ✅ Build #{{build.number}} succeeded
        > **Repo**: {{repo.owner}}/{{repo.name}}
        > **Branch**: {{build.branch}}
        > **Commit**: {{truncate build.commit 8}}
        > **Author**: {{build.author}}
        > **Link**: {{build.link}}
    when:
      - event: [push, pull_request]
        status: [success]

  - name: discord-failure
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: DISCORD_WEBHOOK_ID
      webhook_token:
        from_secret: DISCORD_WEBHOOK_TOKEN
      username: minecraft-server-manager CI
      message: |
        ❌ Build #{{build.number}} failed
        > **Repo**: {{repo.owner}}/{{repo.name}}
        > **Branch**: {{build.branch}}
        > **Commit**: {{truncate build.commit 8}}
        > **Author**: {{build.author}}
        > **Link**: {{build.link}}
    when:
      - event: [push, pull_request]
        status: [failure]

  - name: discord-event
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: DISCORD_WEBHOOK_ID
      webhook_token:
        from_secret: DISCORD_WEBHOOK_TOKEN
      username: minecraft-server-manager CI
      message: |
        📦 {{uppercasefirst build.event}}: {{build.ref}}
        > **Repo**: {{repo.owner}}/{{repo.name}}
        > **Commit**: {{truncate build.commit 8}}
        > **Author**: {{build.author}}
        > **Link**: {{build.link}}
    when:
      - event: [tag, deployment]
