steps:
  - name: trivy-scan
    image: woodpeckerci/plugin-trivy
    settings:
      dir: .
      severity: HIGH,CRITICAL
      exit-code: 1
      skip-dirs: vendor,node_modules
    when:
      - event: [push, pull_request]

  - name: build-and-push
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ${DOCKER_REGISTRY}
      repo: ${IMAGE_NAME}
      tags:
        - latest
        - ${WOODPECKER_TAG:-${WOODPECKER_COMMIT}}
      dockerfile: Dockerfile
      context: .
      build-args:
        NODE_ENV: production
      docker-config-json:
        from_secret: docker-config-json
      cache: true
    when:
      - event: push
        branch: main

  - name: discord-success
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: DISCORD_WEBHOOK_ID
      webhook_token:
        from_secret: DISCORD_WEBHOOK_TOKEN
      username: minecraft-server-manager CI
      message: |
        ✅ Build succeeded
        Repo: {{repo.name}}
        Branch: {{build.branch}}
        Commit: {{truncate build.commit 8}}
        Link: {{build.link}}
    when:
      - event: [push, pull_request, tag, deployment]
        status: [success]

  - name: discord-failure
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: DISCORD_WEBHOOK_ID
      webhook_token:
        from_secret: DISCORD_WEBHOOK_TOKEN
      username: minecraft-server-manager CI
      message: |
        ❌ Build failed
        Repo: {{repo.name}}
        Branch: {{build.branch}}
        Commit: {{truncate build.commit 8}}
        Link: {{build.link}}
    when:
      - event: [push, pull_request, tag, deployment]
        status: [failure]
